# Optional overlay: Hyperspeed DNS control plane + API provisioning.
# Requires Cloudflare DNS Edit access to the zone for GIFTED_DNS_BASE_DOMAIN.
#
# Secrets live in apps/control-plane/.env (CONTROL_PLANE_BEARER_TOKEN, CLOUDFLARE_API_TOKEN,
# CLOUDFLARE_ZONE_ID). They are injected via env_file below — save that file to disk before
# `docker compose up` (an unsaved buffer leaves a 0-byte file and the control-plane will exit).
# Optional: copy the same keys into the repo-root .env and use ${VAR} elsewhere; avoid Windows
# User env placeholders (e.g. CLOUDFLARE_API_TOKEN=x) overriding real values.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.provisioning.yml up -d --build
#
# Inside Docker, the API uses http://control-plane:8787 (not TLS). For HTTPS from your machine:
#   https://localhost:8443/health  (self-signed; Caddy tls internal)

services:
  control-plane:
    build:
      context: ./apps/control-plane
      dockerfile: Dockerfile
    env_file:
      - apps/control-plane/.env
    environment:
      HTTP_ADDR: :8787
      AUDIT_DB_PATH: /data/control-plane.sqlite
    volumes:
      - control_plane_data:/data
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8787/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    env_file:
      - apps/control-plane/.env
    environment:
      PROVISIONING_BASE_URL: http://control-plane:8787

  caddy-cp:
    image: caddy:2-alpine
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile.control-plane:/etc/caddy/Caddyfile:ro
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  control_plane_data:
