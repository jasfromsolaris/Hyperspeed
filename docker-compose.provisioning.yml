# Optional overlay: Hyperspeed DNS control plane + API → provisioning gateway (Worker dev).
# Requires Cloudflare DNS Edit access to the zone for GIFTED_DNS_BASE_DOMAIN.
#
# Secrets for the control plane only: apps/control-plane/.env (CONTROL_PLANE_BEARER_TOKEN,
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ZONE_ID). Do not mount this file into the API service.
#
# Gifted DNS flow: API signs requests to the Worker (wrangler dev on port 8789 by default); Worker
# proxies to the control plane with CONTROL_PLANE_BEARER_TOKEN. See workers/provisioning-gateway/README.md.
#
# Repo-root .env (for the API container):
#   PROVISIONING_BASE_URL=http://host.docker.internal:8789
#   PROVISIONING_INSTALL_ID=dev
#   PROVISIONING_INSTALL_SECRET=<same as wrangler kv put install:dev ...>
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.provisioning.yml up -d --build
#
# Control plane HTTPS (self-signed) from host: https://localhost:8443/health
# Control plane HTTP: http://localhost:8787/health

services:
  control-plane:
    build:
      context: ./apps/control-plane
      dockerfile: Dockerfile
    env_file:
      - apps/control-plane/.env
    environment:
      HTTP_ADDR: :8787
      AUDIT_DB_PATH: /data/control-plane.sqlite
    volumes:
      - control_plane_data:/data
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8787/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    environment:
      PROVISIONING_BASE_URL: ${PROVISIONING_BASE_URL:-http://host.docker.internal:8789}
      PROVISIONING_INSTALL_ID: ${PROVISIONING_INSTALL_ID:-dev}
      PROVISIONING_INSTALL_SECRET: ${PROVISIONING_INSTALL_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy-cp:
    image: caddy:2-alpine
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile.control-plane:/etc/caddy/Caddyfile:ro
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  control_plane_data:
