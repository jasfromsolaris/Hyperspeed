# Render Blueprint — deploy the DNS control plane from a private Hyperspeed monorepo.
# Dashboard: New Web Service → connect repo; or use Blueprint with this file at repo root.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hyperspeed-control-plane
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/control-plane
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: BASE_DOMAIN
        value: hyperspeedapp.com
      - key: CLOUDFLARE_PROXIED
        value: "false"
      - key: AUDIT_DB_PATH
        value: /tmp/control-plane.sqlite
      - key: CONTROL_PLANE_BEARER_TOKEN
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ZONE_ID
        sync: false
