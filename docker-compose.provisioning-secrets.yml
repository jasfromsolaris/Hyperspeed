# Optional overlay: Docker Compose file-based secrets for PROVISIONING_INSTALL_ID / PROVISIONING_INSTALL_SECRET.
# Create ./secrets/provisioning_install_id and ./secrets/provisioning_install_secret (one line each, no trailing spaces).
# Usage: docker compose -f docker-compose.yml -f docker-compose.provisioning-secrets.yml up -d --build

services:
  api:
    secrets:
      - provisioning_install_id
      - provisioning_install_secret
    environment:
      PROVISIONING_INSTALL_ID_FILE: /run/secrets/provisioning_install_id
      PROVISIONING_INSTALL_SECRET_FILE: /run/secrets/provisioning_install_secret

secrets:
  provisioning_install_id:
    file: ./secrets/provisioning_install_id
  provisioning_install_secret:
    file: ./secrets/provisioning_install_secret
