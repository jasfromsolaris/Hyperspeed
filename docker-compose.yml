services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: hyperspeed-caddy:local
    ports:
      # Default 18080 avoids "address already in use" on hosts where 80/443/8080 are taken (paste-and-deploy).
      - "${CADDY_HTTP_PORT:-18080}:80"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-postmaster@example.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hyperspeed
      POSTGRES_PASSWORD: hyperspeed
      POSTGRES_DB: hyperspeed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperspeed -d hyperspeed"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        VERSION: ${HYPERSPEED_VERSION:-dev}
        GIT_SHA: ${HYPERSPEED_GIT_SHA:-}
    # No host port: API is reached via Caddy -> api:8080 on the Docker network only.
    # Publishing 8080 breaks shared hosts where 8080 is already taken; use /api on Caddy or a compose override to expose.
    environment:
      DATABASE_URL: postgres://hyperspeed:hyperspeed@postgres:5432/hyperspeed?sslmode=disable
      # Required for org realtime and space file collab WebSocket (presence / Yjs relay).
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production-min-32-chars-long}
      DEBUG: ${DEBUG:-1}
      # 32 bytes base64. Override in your environment for anything non-dev.
      HS_SSH_ENCRYPTION_KEY: ${HS_SSH_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      HTTP_ADDR: :8080
      # Default matches default Caddy host port (DEBUG=1 still allows any origin for first deploy).
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:18080}
      # Same public origin as the browser (scheme + host; no path). Set when using HTTPS team URL.
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      # One-click default: bootstrap token exchange against Hyperspeed provisioning gateway.
      # Keep install ID/secret empty unless an operator explicitly injects them.
      PROVISIONING_BASE_URL: ${PROVISIONING_BASE_URL:-https://provision-gw.hyperspeedapp.com}
      PROVISIONING_INSTALL_ID: ${PROVISIONING_INSTALL_ID:-}
      PROVISIONING_INSTALL_SECRET: ${PROVISIONING_INSTALL_SECRET:-}
      # Prefer Docker secrets or mounted files over env (Phase 1); paths are optional.
      PROVISIONING_INSTALL_ID_FILE: ${PROVISIONING_INSTALL_ID_FILE:-}
      PROVISIONING_INSTALL_SECRET_FILE: ${PROVISIONING_INSTALL_SECRET_FILE:-}
      PROVISIONING_BOOTSTRAP_TOKEN: ${PROVISIONING_BOOTSTRAP_TOKEN:-}
      PROVISIONING_STATE_PATH: ${PROVISIONING_STATE_PATH:-/var/lib/hyperspeed/provisioning/state.json}
      FILES_S3_ENDPOINT: http://minio:9000
      FILES_S3_REGION: us-east-1
      FILES_S3_BUCKET: hyperspeed-files
      FILES_S3_ACCESS_KEY: minioadmin
      FILES_S3_SECRET_KEY: minioadmin
      FILES_S3_FORCE_PATH_STYLE: "true"
      HS_GIT_WORKDIR_BASE: /var/lib/hyperspeed/git
    volumes:
      - gitwork:/var/lib/hyperspeed/git
      - provisioning_state:/var/lib/hyperspeed/provisioning
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        # Set VITE_YJS_COLLAB=false in .env to disable CRDT in the production bundle.
        VITE_YJS_COLLAB: "${VITE_YJS_COLLAB:-true}"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
  gitwork:
  caddy_data:
  caddy_config:
  provisioning_state:
