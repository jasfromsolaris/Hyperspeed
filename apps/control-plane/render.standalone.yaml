# Copy to `render.yaml` at the root of a control-plane-only private repo (see scripts/export-control-plane-mirror.*).
services:
  - type: web
    name: hyperspeed-control-plane
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: BASE_DOMAIN
        value: hyperspeedapp.com
      - key: CLOUDFLARE_PROXIED
        value: "false"
      - key: AUDIT_DB_PATH
        value: /tmp/control-plane.sqlite
      - key: CONTROL_PLANE_BEARER_TOKEN
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ZONE_ID
        sync: false
