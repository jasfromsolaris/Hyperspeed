# Air: rebuild & restart the API on Go file changes.
# Install: go install github.com/air-verse/air@latest
# Run from apps/api with DEBUG=true:  air
root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/server"
  delay = 200
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_ext = ["go", "mod", "sum"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
